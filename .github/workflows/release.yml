name: Windows release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run validate:content
      - run: npm run validate:a11y
      - run: npm test
      - run: npm run build
      - run: cargo fmt --check --manifest-path src-tauri/Cargo.toml
      - run: cargo check --manifest-path src-tauri/Cargo.toml

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: windows-latest
    # Code signing activates automatically once these repository secrets exist.
    # While they are unset, the env values are empty and the signing step is
    # skipped, so releases still build (unsigned) as before.
    env:
      WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
      WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "SkillForge Academy ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md for release details."
          releaseDraft: true
          prerelease: false
      - name: Sign Windows installer
        # Runs only when a code-signing certificate is configured (see docs/CODE-SIGNING.md).
        if: ${{ env.WINDOWS_PFX_BASE64 != '' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP 'codesign.pfx'
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_PFX_BASE64))
          $securePwd = ConvertTo-SecureString $env:WINDOWS_PFX_PASSWORD -AsPlainText -Force
          ./scripts/sign-windows.ps1 -PfxPath $pfxPath -PfxPassword $securePwd
          Remove-Item $pfxPath -Force
          # Replace the unsigned installer that tauri-action already uploaded.
          $installer = Get-ChildItem src-tauri/target/release/bundle/nsis/*_x64-setup.exe |
            Sort-Object LastWriteTime | Select-Object -Last 1
          gh release upload "${{ github.ref_name }}" "$($installer.FullName)" --clobber
      - name: Create SHA-256 checksums
        shell: pwsh
        run: |
          $files = Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            $assetName = $file.Name -replace ' ', '.'
            "$hash  $assetName"
          }
          $lines | Set-Content SHA256SUMS.txt -Encoding ascii
          gh release upload "${{ github.ref_name }}" SHA256SUMS.txt --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
