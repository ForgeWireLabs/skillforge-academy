name: Windows release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run validate:content
      - run: npm run validate:a11y
      - run: npm test
      - run: npm run build
      - run: cargo fmt --check --manifest-path src-tauri/Cargo.toml
      - run: cargo check --manifest-path src-tauri/Cargo.toml

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Apex A+ Academy ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md for release details."
          releaseDraft: true
          prerelease: false
      - name: Create SHA-256 checksums
        shell: pwsh
        run: |
          $files = Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }
          $lines | Set-Content SHA256SUMS.txt -Encoding ascii
          gh release upload "${{ github.ref_name }}" SHA256SUMS.txt --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
